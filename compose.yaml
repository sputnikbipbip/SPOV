services:
  api:
    build:
      context: ./Backend
      dockerfile: SPOV_Backend/Dockerfile
    env_file:
      - ./Backend/.env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ConnectionStrings__DefaultConnection: Data Source=/app/data/spov.db
    ports:
      - "8080:8080"
    volumes:
      - api-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./Frontend
      dockerfile: ../docker/frontend.Dockerfile
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    ports:
      - "4200:4200"
    environment:
      CHOKIDAR_USEPOLLING: true

volumes:
  api-data:

