secrets:
  postgres-password:
    file: ./docker/secrets/postgres-password.txt

services:
  db:
    image: postgres:17-alpine
    secrets:
      - postgres-password
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spov}
      POSTGRES_USER: ${POSTGRES_USER:-spov}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres-password
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spov} -d ${POSTGRES_DB:-spov}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./Backend
      dockerfile: src/SPOV.WebApi/Dockerfile
    env_file:
      - ./Backend/.env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:8080
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  pg-data:
